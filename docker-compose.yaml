services:
  # Configure these in Dokploy Environment:
  # DATABASE_URL, REDIS_URL, JWT_SECRET, ADMIN_SECRET, CLIENT_ID, CLIENT_SECRET
  authorizer:
    build: .
    restart: unless-stopped
    entrypoint:
      - ./authorizer
    command:
      - "--database-type=${DATABASE_TYPE:-postgres}"
      - "--database-url=${DATABASE_URL:?DATABASE_URL is required}"
      - "--redis-url=${REDIS_URL:?REDIS_URL is required}"
      - "--jwt-type=${JWT_TYPE:-HS256}"
      - "--jwt-secret=${JWT_SECRET:?JWT_SECRET is required}"
      - "--admin-secret=${ADMIN_SECRET:?ADMIN_SECRET is required}"
      - "--client-id=${CLIENT_ID:?CLIENT_ID is required}"
      - "--client-secret=${CLIENT_SECRET:?CLIENT_SECRET is required}"
      - "--enable-playground=${ENABLE_PLAYGROUND:-false}"
      - "--app-cookie-secure=${APP_COOKIE_SECURE:-true}"
      - "--admin-cookie-secure=${ADMIN_COOKIE_SECURE:-true}"
    expose:
      - "8080"
